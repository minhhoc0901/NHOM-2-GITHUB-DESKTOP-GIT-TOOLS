<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Sách - Thư Viện Hiện Đại</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-book-reader"></i> Thư Viện Sách
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-home"></i> Trang chủ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="search_book.html">
                            <i class="fas fa-search"></i> Tìm kiếm
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="alert('Chức năng đang phát triển!')">
                            <i class="fas fa-plus-circle"></i> Thêm sách
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="min-height: 60vh;">
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 text-center">
                <h2 class="mb-4 fw-bold">Tìm Kiếm Sách</h2>
                <form id="searchBookForm" onsubmit="SearchBook(event)" class="d-flex gap-2">
                    <input type="text" id="keyword" class="form-control form-control-lg"
                        placeholder="Nhập tên sách hoặc tác giả..." required />
                    <button type="submit" class="btn btn-primary btn-lg px-4">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                </form>
            </div>
        </div>

        <div id="searchResult" class="mb-5">
            <!-- Kết quả tìm kiếm sẽ hiển thị ở đây -->
            <div class="text-center text-muted">
                <p>Nhập từ khóa và nhấn tìm kiếm để xem kết quả</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light text-center text-lg-start mt-auto py-3 border-top">
        <div class="container text-center">
            <p class="mb-0 text-muted">
                © 2026 - Nhóm 2 GIT DESKTOP | <i class="fas fa-code"></i> with <i class="fas fa-heart text-danger"></i>
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../action.js"></script>
</body>

</html>
